// ─── SHARED UTILS ─────────────────────────────────────────────────────────────
function Check({ done, color, onToggle, size=15 }) {
  return (
    <div onClick={onToggle} style={{
      width:size, height:size, borderRadius:3, flexShrink:0, cursor:"pointer",
      border:`1px solid ${done?color:"#555"}`,
      background:done?color:"transparent",
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      {done && <span style={{fontSize:size-5, color:"#fff", lineHeight:1}}>✓</span>}
    </div>
  );
}

function Card({ T, children, style={} }) {
  return (
    <div style={{background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14, marginBottom:12, ...style}}>
      {children}
    </div>
  );
}

function SectionTitle({ T, children, color }) {
  return (
    <div style={{fontSize:10, textTransform:"uppercase", letterSpacing:"0.14em", color:color||T.textFaint, marginBottom:8}}>
      {children}
    </div>
  );
}

// ─── HOME VIEW ────────────────────────────────────────────────────────────────
function HomeView({
  T, tc, ac, dark, session, dk, isShab, injury,
  phase, weekIdx, curWeek, checked, toggle,
  mustsDone, toggleMust, campChecks, toggleCamp,
  mochaLog, toggleMocha, hsLog, saveHs,
  todoLog, toggleTodo, removeTodo, newTodo, setNewTodo,
  newTodoCat, setNewTodoCat, addTodo,
  workoutLog, track, dow, camp, cyclePhase, cycleDay,
  staticLog, moons, mealPlan, setView, iS, btn,
}) {
  const [rhythmOpen, setRhythmOpen] = useState(false);
  const phColor = PHASE_COLORS[cyclePhase]?.color || TEAL;
  const todayMeal = mealPlan[dow] || "";
  const nextMoon = moons[0];

  // Build aggregated today list
  const allItems = [];

  // Session tasks
  if (session && !isShab) {
    const sColor = injury
      ? (session.type==="pool"?TEAL : session.type==="dry"?BLUE : AMBER)
      : TEAL;
    const sIcon = injury
      ? (session.type==="pool"?"🌊" : session.type==="dry"?"🌬" : "💪")
      : "🌊";
    session.tasks.forEach((task, ti) => {
      allItems.push({
        cat: injury ? session.label : "Dive Training",
        color: sColor, icon: sIcon,
        text: task,
        done: !!checked[`${dk}_${ti}`],
        toggle: () => toggle(`${dk}_${ti}`),
      });
    });
  }

  // Daily musts
  DAILY_MUSTS.forEach(m => {
    allItems.push({
      cat:"Daily Musts", color:TEAL, icon:m.icon,
      text:m.label, done:!!mustsDone[m.id],
      toggle:()=>toggleMust(m.id),
    });
  });

  // Camp daily (morning + midday + evening)
  if (camp) {
    [...CAMP_MORNING, ...CAMP_MIDDAY, ...CAMP_EVENING].forEach(item => {
      const k = `${TODAY_STR}_camp_${item.id}`;
      allItems.push({
        cat:"Camp", color:AMBER, icon:item.critical?"⚠":"🏕",
        text:item.text, done:!!campChecks[k],
        toggle:()=>toggleCamp(k),
      });
    });
    const weekly = CAMP_WEEKLY[dow];
    if (weekly?.items?.length > 0) {
      weekly.items.forEach(item => {
        const k = `${TODAY_STR}_campw_${item.id}`;
        allItems.push({
          cat:"Camp", color:AMBER, icon:item.critical?"⚠":"🏕",
          text:item.text, done:!!campChecks[k],
          toggle:()=>toggleCamp(k),
        });
      });
    }
  }

  // Mocha
  MOCHA_SESSIONS.forEach(s => {
    allItems.push({
      cat:"Mocha", color:GREEN, icon:s.icon,
      text:s.label, done:!!mochaLog[s.id],
      toggle:()=>toggleMocha(s.id),
    });
  });

  // Homeschool
  allItems.push({
    cat:"Homeschool", color:BLUE, icon:"📚",
    text:"Handwriting practice", done:!!hsLog.handwriting,
    toggle:()=>saveHs({handwriting:!hsLog.handwriting}),
  });
  if (hsLog.skill) {
    allItems.push({
      cat:"Homeschool", color:BLUE, icon:"📚",
      text:`Skill: ${hsLog.skill}`, done:!!hsLog.skillDone,
      toggle:()=>saveHs({skillDone:!hsLog.skillDone}),
    });
  }

  // Extra todos
  (todoLog||[]).forEach(t => {
    const catInfo = TODO_CATS.find(c=>c.key===t.cat)||TODO_CATS[TODO_CATS.length-1];
    allItems.push({
      cat:t.cat, color:catInfo.color, icon:catInfo.icon,
      text:t.text, done:t.done,
      toggle:()=>toggleTodo(t.id),
      remove:()=>removeTodo(t.id),
      isExtra:true,
    });
  });

  const catOrder = ["Dive Training","Daily Musts","Camp","Mocha","Homeschool","Honeysuckle","Life Admin","Other"];
  const byCategory = {};
  allItems.forEach(item => {
    (byCategory[item.cat] = byCategory[item.cat]||[]).push(item);
  });
  const totalDone = allItems.filter(i=>i.done).length;
  const total = allItems.length;
  const pct = total===0 ? 0 : Math.round((totalDone/total)*100);

  return (
    <div>
      {/* Hero image */}
      <div style={{position:"relative", borderRadius:12, overflow:"hidden", marginBottom:16, height:180, background:"#0d1820"}}>
        <img src={HERO_IMAGE_SRC} alt="Freediver" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 30%"}} />
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.6) 100%)"}} />
        <div style={{position:"absolute",bottom:14,left:14,right:14}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginBottom:2}}>
            {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
          </div>
          <div style={{fontSize:19,color:"#fff",marginBottom:2}}>
            {new Date().getHours()<12?"Good morning":new Date().getHours()<17?"Good afternoon":"Good evening"} 🌿
          </div>
          <div style={{fontSize:12,color:phColor,fontStyle:"italic"}}>
            {cyclePhase} phase · Day {cycleDay}
          </div>
        </div>
      </div>

      {/* Injury banner */}
      {injury && (
        <div style={{background:"#c4503018",border:"1px solid #c4505055",borderRadius:9,padding:"10px 14px",marginBottom:12}}>
          <div style={{fontSize:13,color:"#c45030",marginBottom:3}}>🦶 Injury Mode — Ankle</div>
          <div style={{fontSize:11,color:"#c4906088"}}>Arms-only pool Tue + Sun · Upper body strength Mon + Thu · Breathwork Wed + Fri · Rest Sat. No lower body load.</div>
        </div>
      )}

      {/* Fasting banner */}
      {new Date().getDay()===5 && (
        <div style={{background:"#7a4a3015",border:"1px solid #7a4a3044",borderRadius:9,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16}}>🕊</span>
          <div>
            <span style={{fontSize:13,color:"#c4905a"}}>Fasting day</span>
            <span style={{fontSize:11,color:T.textFaint,marginLeft:8}}>Friday — go gently with training intensity</span>
          </div>
        </div>
      )}

      {/* Daily Rhythm — collapsible */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}>
        <div onClick={()=>setRhythmOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",cursor:"pointer"}}>
          <div>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.14em",color:T.textFaint}}>Daily Rhythm</div>
            <div style={{fontSize:13,color:isPoolDay()?TEAL:BLUE,marginTop:2}}>
              {isPoolDay()?"Track B — Pool Day (5am)":"Track A — Standard Day (1pm training)"}
            </div>
          </div>
          <span style={{fontSize:14,color:T.textFaint}}>{rhythmOpen?"▲":"▼"}</span>
        </div>
        {rhythmOpen && (
          <div style={{padding:"0 14px 14px",borderTop:`1px solid ${T.border}`}}>
            <div style={{position:"relative",paddingTop:10}}>
              <div style={{position:"absolute",left:36,top:10,bottom:0,width:1,background:`linear-gradient(180deg,${TEAL}55,transparent)`}} />
              {track.map((slot,i) => {
                const cc = RHYTHM_COLORS[slot.cat]||"#888";
                return (
                  <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                    <div style={{width:34,flexShrink:0,textAlign:"right",fontSize:10,color:T.textFaint,paddingTop:3}}>{slot.time}</div>
                    <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,marginTop:5,
                      background:slot.critical?"#c4873a":cc,zIndex:1,
                      border:slot.critical?"2px solid #c4873a44":"none"}} />
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:slot.critical?"#c4873a":cc}}>{slot.icon} {slot.label}</div>
                      {slot.detail && <div style={{fontSize:11,color:T.textFaint,marginTop:1,lineHeight:1.4}}>{slot.detail}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Today's Master Checklist */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.14em",color:T.textFaint}}>Everything Today</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:11,color:pct===100&&total>0?"#5bb8a0":T.textFaint}}>{totalDone}/{total}</div>
            <div style={{width:40,height:4,background:T.border,borderRadius:2,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:TEAL,transition:"width 0.4s"}} />
            </div>
          </div>
        </div>

        {total===0 ? (
          <div style={{fontSize:12,color:T.textVeryDim,fontStyle:"italic"}}>Nothing scheduled — Shabbat rest, or check Week tab.</div>
        ) : (
          catOrder.filter(cat=>byCategory[cat]?.length>0).map(cat => {
            const items = byCategory[cat];
            const catColor = items[0].color;
            const catIcon = items[0].icon;
            const catDone = items.filter(i=>i.done).length;
            return (
              <div key={cat} style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                  <span style={{fontSize:13}}>{catIcon}</span>
                  <span style={{fontSize:11,color:catColor,fontWeight:600}}>{cat}</span>
                  <span style={{fontSize:10,color:T.textFaint}}>{catDone}/{items.length}</span>
                </div>
                {items.map((item,ii) => (
                  <div key={ii} style={{display:"flex",alignItems:"center",gap:8,paddingLeft:6,marginBottom:4}}>
                    <Check done={item.done} color={item.color} onToggle={item.toggle} />
                    <span onClick={item.toggle} style={{flex:1,fontSize:12,cursor:"pointer",
                      color:item.done?T.textFaint:T.textSub,
                      textDecoration:item.done?"line-through":"none"}}>
                      {item.text}
                    </span>
                    {item.isExtra && (
                      <button onClick={item.remove} style={{background:"none",border:"none",color:T.textVeryDim,cursor:"pointer",fontSize:12,padding:"0 2px"}}>✕</button>
                    )}
                  </div>
                ))}
              </div>
            );
          })
        )}

        {/* Add extra task */}
        <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10,marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
          <select value={newTodoCat} onChange={e=>setNewTodoCat(e.target.value)}

            {TODO_CATS.map(c=><option key={c.key} value={c.key}>{c.icon} {c.key}</option>)}
          </select>
          <input value={newTodo} onChange={e=>setNewTodo(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){addTodo(newTodo,newTodoCat);setNewTodo("");}}}
            placeholder="Add a task..." style={{...iS,flex:1,minWidth:100}} />
          <button onClick={()=>{addTodo(newTodo,newTodoCat);setNewTodo("");}}
            style={{...btn(TEAL,true),padding:"6px 12px"}}>+ Add</button>
        </div>
      </div>

      {/* Bottom info tiles */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {/* Next moon */}
        {nextMoon && (
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:12}}>
            <div style={{fontSize:10,color:T.textFaint,marginBottom:4}}>Next Moon</div>
            <div style={{fontSize:16,marginBottom:2}}>{nextMoon.type==="full"?"🌕":"🌑"}</div>
            <div style={{fontSize:12,color:nextMoon.type==="full"?"#f5d070":"#a0b8e8"}}>{nextMoon.name}</div>
            <div style={{fontSize:11,color:T.textFaint}}>{moonDate(nextMoon.date)}</div>
          </div>
        )}
        {/* Tonight's dinner */}
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:12}}>
          <div style={{fontSize:10,color:T.textFaint,marginBottom:4}}>Tonight's Dinner</div>
          <div style={{fontSize:13,color:todayMeal?T.textSub:T.textVeryDim,fontStyle:todayMeal?"normal":"italic"}}>
            {todayMeal||"Not planned"}
          </div>
          {!todayMeal && (
            <button onClick={()=>setView("life")} style={{marginTop:6,fontSize:10,color:T.textFaint,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0}}>
              Plan in Life →
            </button>
          )}
        </div>
        {/* Last static hold */}
        {staticLog.length>0 && (
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:12}}>
            <div style={{fontSize:10,color:T.textFaint,marginBottom:4}}>Last Static Apnea</div>
            <div style={{display:"flex",gap:8}}>
              {[staticLog[0].h1,staticLog[0].h2,staticLog[0].h3].filter(Boolean).map((t,i)=>(

                  <div style={{fontSize:15,color:TEAL}}>{t}</div>

              ))}
            </div>
          </div>

        {/* Quick nav */}

          ))}
        </div>
      </div>

  );

// ─── WEEK VIEW ────────────────────────────────────────────────────────────────
function WeekView({ T, phase, weekIdx, curWeek, dow, checked, toggle, workoutLog, setWorkoutLog, injury, save, iS, btn }) {
  const [editWod, setEditWod] = useState(null);
  const weeks = WEEKS[phase];
  const pct = (() => {
    let tot=0,done=0;
    DAYS.forEach(d => {
      const s = curWeek.sessions[d];
      if(!s||s.type==="shabbat") return;
      const dk = `${phase}_w${weekIdx}_${d}`;
      s.tasks.forEach((_,i)=>{ tot++; if(checked[`${dk}_${i}`]) done++; });
    });
    return tot===0?0:Math.round((done/tot)*100);
  })();

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <span style={{fontSize:15,color:T.text}}>Week {curWeek.week}</span>
          <span style={{fontSize:11,color:T.textFaint,marginLeft:8}}>of {weeks.length} · {PHASE_META[phase].label}</span>
        </div>
        <span style={{fontSize:12,color:TEAL}}>{pct}%</span>
      </div>
      <div style={{height:3,background:T.border,borderRadius:2,marginBottom:14,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:TEAL,transition:"width 0.4s"}} />
      </div>
      {injury && (
        <div style={{background:"#c4503012",border:"1px solid #c4505044",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#c46050"}}>
          🦶 Injury mode active — showing modified programme
        </div>
      )}
      {DAYS.map(day => {
        const rawSession = curWeek.sessions[day];
        const s = injury ? INJURY_WEEK[day] : rawSession;
        if (!s) return null;
        const dk = `${phase}_w${weekIdx}_${day}`;
        const isToday = day===dow;
        const tc = getTc(s.type);
        const isShab = s.type==="shabbat";
        const wd = workoutLog[dk];
        const allDone = !isShab && s.tasks.every((_,i)=>checked[`${dk}_${i}`]);
        return (
          <div key={day} style={{
            border:`1px solid ${isToday?TEAL+"66":T.border}`,
            borderLeft:`3px solid ${isToday?TEAL:tc}`,
            borderRadius:8,background:isToday?T.card:T.surface,
            marginBottom:10,opacity:isShab?0.65:1,overflow:"hidden",
          }}>
            <div style={{padding:"10px 14px 6px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:600,color:isToday?TEAL:T.text}}>{day}</span>
                {isToday && <span style={{fontSize:9,background:TEAL+"33",color:TEAL,padding:"1px 7px",borderRadius:10}}>TODAY</span>}
                {allDone && <span style={{fontSize:11,color:TEAL}}>✓</span>}
              </div>
              <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:tc+"22",color:tc}}>{s.label}</span>
            </div>
            <div style={{padding:"2px 14px 12px"}}>
              {s.tasks.map((task,ti) => {
                const key=`${dk}_${ti}`;
                const done=!!checked[key];
                return (
                  <div key={ti} onClick={()=>!isShab&&toggle(key)}
                    style={{display:"flex",alignItems:"flex-start",gap:8,cursor:isShab?"default":"pointer",
                      padding:"3px 6px",borderRadius:4,background:done?tc+"0d":"transparent",marginBottom:2}}>
                    {!isShab && <Check done={done} color={tc} onToggle={()=>toggle(key)} size={14} />}
                    <span style={{fontSize:12,color:done?T.textFaint:T.textSub,textDecoration:done?"line-through":"none",lineHeight:1.5}}>{task}</span>
                  </div>
                );
              })}
              {s.note && <div style={{fontSize:11,color:T.textFaint,fontStyle:"italic",marginTop:6,paddingLeft:6,borderLeft:`2px solid ${tc}44`}}>{s.note}</div>}

              {/* Workout log */}
              {!isShab && (() => {
                const isEditing = editWod===dk;
                return (
                  <div style={{marginTop:8}}>
                    {wd && !isEditing && (
                      <div style={{background:tc+"0d",border:`1px solid ${tc}33`,borderRadius:6,padding:"8px 10px",marginBottom:6}}>
                        <div style={{fontSize:10,color:tc,marginBottom:4}}>Session logged ✓</div>
                        {wd.exercises?.filter(e=>e.name).map((ex,i)=>(
                          <div key={i} style={{fontSize:11,color:T.textDim,marginBottom:2}}>
                            <span style={{color:T.textSub}}>{ex.name}</span>
                            {ex.sets?.map((s,si)=>(
                              <span key={si} style={{color:T.textFaint}}> · {si+1}: ↑{s.pulseBefore||"X"} ↓{s.pulseAfter||"—"} d{s.difficulty||"—"}</span>
                            ))}
                          </div>
                        ))}
                      </div>
                    )}
                    {isEditing && (
                      <WorkoutEditor
                        T={T} tc={tc} dk={dk} session={s}
                        existing={workoutLog[dk]}
                        onSave={(data)=>{
                          const n={...workoutLog,[dk]:data};
                          setWorkoutLog(n); save({workoutLog:n}); setEditWod(null);
                        }}
                        onClose={()=>setEditWod(null)}
                      />
                    )}
                    <button onClick={()=>setEditWod(isEditing?null:dk)} style={{
                      background:"none",border:`1px solid ${tc}33`,borderRadius:5,
                      padding:"3px 10px",color:tc+"99",cursor:"pointer",fontSize:11,fontFamily:"inherit",
                    }}>{wd?"✏️ Edit workout":"+ Log workout"}</button>
                  </div>
                );
              })()}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── WORKOUT EDITOR ───────────────────────────────────────────────────────────
function WorkoutEditor({ T, tc, dk, session, existing, onSave, onClose }) {
  const [exercises, setExercises] = useState(() => {
    if (existing?.exercises?.length>0) return existing.exercises;
    return session.tasks.map(t => ({
      id:Date.now()+Math.random(), name:t,
      type: session.type==="pool"||session.type==="dry"?"apnea":"strength",
      sets:[{id:Date.now()+Math.random(),pulseBefore:"",pulseAfter:"",difficulty:"",notes:""}],
      detail:"",
    }));
  });
  const [sessionNotes, setSessionNotes] = useState(existing?.sessionNotes||"");
  const [newEx, setNewEx] = useState("");
  const iS = {background:T.input,border:`1px solid ${T.inputBorder}`,borderRadius:4,padding:"5px 8px",color:T.text,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"};

  function addSet(exId) {
    setExercises(p=>p.map(e=>e.id!==exId?e:{...e,sets:[...e.sets,{id:Date.now(),pulseBefore:"",pulseAfter:"",difficulty:"",notes:""}]}));
  }
  function updSet(exId,sId,field,val) {
    setExercises(p=>p.map(e=>e.id!==exId?e:{...e,sets:e.sets.map(s=>s.id!==sId?s:{...s,[field]:val})}));
  }
  function addExercise() {
    if (!newEx.trim()) return;
    setExercises(p=>[...p,{id:Date.now(),name:newEx.trim(),type:"other",sets:[{id:Date.now(),pulseBefore:"",pulseAfter:"",difficulty:"",notes:""}],detail:""}]);
    setNewEx("");
  }

  return (
    <div style={{background:T.card,border:`1px solid ${tc}55`,borderRadius:8,padding:12,marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:12,color:tc}}>Log session</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer"}}>✕</button>
      </div>
      {exercises.map(ex=>(
        <div key={ex.id} style={{background:T.cardAlt,border:`1px solid ${T.border}`,borderRadius:7,marginBottom:8,overflow:"hidden"}}>
          <div style={{background:tc+"22",padding:"7px 10px",fontSize:12,color:T.text,fontWeight:600}}>{ex.name}</div>
          <div style={{padding:"6px 10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"24px 1fr 60px 60px 50px",gap:4,marginBottom:4}}>
              <div style={{fontSize:9,color:T.textFaint}}>#</div>
              <div style={{fontSize:9,color:T.textFaint}}>Notes</div>
              <div style={{fontSize:9,color:T.textFaint,textAlign:"center"}}>Pulse↑</div>
              <div style={{fontSize:9,color:T.textFaint,textAlign:"center"}}>Pulse↓</div>
              <div style={{fontSize:9,color:T.textFaint,textAlign:"center"}}>Diff</div>
            </div>
            {ex.sets.map((s,si)=>(
              <div key={s.id} style={{display:"grid",gridTemplateColumns:"24px 1fr 60px 60px 50px",gap:4,marginBottom:3,alignItems:"center"}}>
                <span style={{fontSize:10,color:T.textFaint,textAlign:"center"}}>{si+1}</span>
                <input value={s.notes} onChange={e=>updSet(ex.id,s.id,"notes",e.target.value)} placeholder="how it felt" style={{...iS,width:"100%"}} />
                <input value={s.pulseBefore} onChange={e=>updSet(ex.id,s.id,"pulseBefore",e.target.value)} placeholder="X" style={{...iS,textAlign:"center"}} />
                <input value={s.pulseAfter} onChange={e=>updSet(ex.id,s.id,"pulseAfter",e.target.value)} placeholder="—" style={{...iS,textAlign:"center"}} />
                <input value={s.difficulty} onChange={e=>updSet(ex.id,s.id,"difficulty",e.target.value)} placeholder="—" style={{...iS,textAlign:"center"}} />
              </div>
            ))}
            <button onClick={()=>addSet(ex.id)} style={{fontSize:10,color:tc,background:"transparent",border:`1px dashed ${tc}55`,borderRadius:4,padding:"2px 8px",cursor:"pointer",marginTop:2,fontFamily:"inherit"}}>+ set</button>
          </div>
        </div>
      ))}
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <input value={newEx} onChange={e=>setNewEx(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addExercise()} placeholder="Add exercise..." style={{...iS,flex:1}} />
        <button onClick={addExercise} style={{background:tc+"22",border:`1px solid ${tc}44`,borderRadius:5,color:tc,cursor:"pointer",padding:"5px 10px",fontSize:11,fontFamily:"inherit"}}>+ Add</button>
      </div>

  function ck(period, id) { return `${TODAY_STR}_${period}_${id}`; }

  function CampItem({ item, period }) {
    const key = ck(period, item.id);

    const note = campNotes[key]||"";
    return (
      <div style={{marginBottom:6}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8}}>

            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:11,color:T.textMid}}>Day</span>
              <input type="range" min={1} max={35} value={cycleDay} onChange={e=>{const v=Number(e.target.value);setCycleDay(v);save({cycleDay:v});}} style={{flex:1,accentColor:cpColor}} />
              <span style={{fontSize:16,color:cpColor,minWidth:24}}>{cycleDay}</span>
            </div>
            <div>
              <label style={{fontSize:10,color:T.textMid,display:"block",marginBottom:3}}>Cycle start date</label>
              <input type="date" value={cycleStart} onChange={e=>{setCycleStart(e.target.value);save({cycleStart:e.target.value});}} style={{...iS,width:"auto"}} />
            </div>
          </div>

          {/* Calendar */}
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <button onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 9px",color:T.textMid,cursor:"pointer",fontFamily:"inherit"}}>←</button>
              <span style={{fontSize:13,color:T.text}}>{new Date(calMonth.y,calMonth.m).toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</span>
              <button onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 9px",color:T.textMid,cursor:"pointer",fontFamily:"inherit"}}>→</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
              {["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:T.textFaint}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {Array.from({length:firstDow}).map((_,i)=><div key={`e${i}`}/>)}
              {Array.from({length:daysInMonth}).map((_,i)=>{
                const day=i+1; const d=ds(day);
                const flow=bleedDays[d];
                const hasFeel=!!feelingsLog[d];
                const isToday=d===TODAY_STR;
                const isSel=d===selDate;
                const fc=flow?FLOW_LEVELS.find(f=>f.key===flow)?.color:null;
                return(
                  <div key={day} onClick={()=>setSelDate(d)} style={{borderRadius:6,padding:"4px 2px",textAlign:"center",cursor:"pointer",minHeight:34,background:isSel?cpColor+"33":fc?fc+"22":"transparent",border:isToday?`1px solid ${cpColor}88`:isSel?`1px solid ${cpColor}55`:`1px solid ${T.border}`}}>
                    <div style={{fontSize:11,color:isToday?cpColor:T.textSub,fontWeight:isToday?"600":"normal"}}>{day}</div>
                    <div style={{fontSize:12,lineHeight:1}}>{flow?<span style={{color:FLOW_LEVELS.find(f=>f.key===flow)?.color}}>{FLOW_LEVELS.find(f=>f.key===flow)?.dot}</span>:hasFeel?<span style={{fontSize:7,color:TEAL}}>●</span>:null}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
              {FLOW_LEVELS.map(f=><div key={f.key} style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,color:f.color}}>{f.dot}</span><span style={{fontSize:10,color:T.textFaint}}>{f.label}</span></div>)}
            </div>
          </div>

          {/* Selected day */}
          <div style={{background:T.surface,border:`1px solid ${cpColor}33`,borderRadius:9,padding:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,color:cpColor}}>{new Date(selDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</span>
              {selDate<=TODAY_STR&&<button onClick={()=>{setShowFeel(true);setFeelingDraft(feelingsLog[selDate]||{energy:"",mood:[],body:[],notes:"",phase:cyclePhase});}} style={{...btn(cpColor,true),padding:"4px 10px"}}>{feelingsLog[selDate]?"Edit":"+ Log feelings"}</button>}
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:T.textFaint,marginBottom:6}}>Flow</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {FLOW_LEVELS.map(f=>{
                  const active=bleedDays[selDate]===f.key;
                  return<button key={f.key} onClick={()=>toggleFlow(selDate,f.key)} style={{padding:"4px 10px",borderRadius:12,border:`1px solid ${active?f.color:T.border}`,background:active?f.color+"22":"transparent",color:active?f.color:T.textFaint,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{f.dot} {f.label}</button>;
                })}
              </div>
            </div>
            {feelingsLog[selDate]&&!showFeel&&(
              <div style={{background:phaseBg(cyclePhase,dark),borderRadius:7,padding:"8px 10px"}}>
                {feelingsLog[selDate].energy&&<div style={{fontSize:12,color:T.textSub,marginBottom:2}}>Energy: {feelingsLog[selDate].energy}</div>}
                {feelingsLog[selDate].mood?.length>0&&<div style={{fontSize:12,color:T.textSub,marginBottom:2}}>Mood: {feelingsLog[selDate].mood.join("  ")}</div>}
                {feelingsLog[selDate].body?.length>0&&<div style={{fontSize:12,color:T.textSub,marginBottom:2}}>Body: {feelingsLog[selDate].body.join("  ")}</div>}
                {feelingsLog[selDate].notes&&<div style={{fontSize:11,color:T.textFaint,fontStyle:"italic",marginTop:4}}>{feelingsLog[selDate].notes}</div>}
              </div>
            )}
            {showFeel&&(
              <div style={{background:phaseBg(cyclePhase,dark),borderRadius:8,padding:12,marginTop:8}}>
                <div style={{fontSize:11,color:cpColor,marginBottom:10}}>How do you feel today?</div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:10,color:T.textFaint,marginBottom:5}}>Energy</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {ENERGY_OPTS.map(o=><button key={o} onClick={()=>setFeelingDraft(p=>({...p,energy:p.energy===o?"":o}))} style={{padding:"4px 9px",borderRadius:12,border:`1px solid ${feelDraft.energy===o?cpColor:T.border}`,background:feelDraft.energy===o?cpColor+"22":"transparent",color:feelDraft.energy===o?cpColor:T.textFaint,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{o}</button>)}
                  </div>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:10,color:T.textFaint,marginBottom:5}}>Mood</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {MOOD_OPTS.map(o=>{const on=(feelDraft.mood||[]).includes(o);return<button key={o} onClick={()=>setFeelingDraft(p=>({...p,mood:on?p.mood.filter(x=>x!==o):[...(p.mood||[]),o]}))} style={{padding:"4px 9px",borderRadius:12,border:`1px solid ${on?cpColor:T.border}`,background:on?cpColor+"22":"transparent",color:on?cpColor:T.textFaint,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{o}</button>;})}
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:T.textFaint,marginBottom:5}}>Body</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {BODY_OPTS.map(o=>{const on=(feelDraft.body||[]).includes(o);return<button key={o} onClick={()=>setFeelingDraft(p=>({...p,body:on?p.body.filter(x=>x!==o):[...(p.body||[]),o]}))} style={{padding:"4px 9px",borderRadius:12,border:`1px solid ${on?TEAL:T.border}`,background:on?TEAL+"22":"transparent",color:on?TEAL:T.textFaint,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{o}</button>;})}
                  </div>
                </div>
                <textarea value={feelDraft.notes||""} onChange={e=>setFeelingDraft(p=>({...p,notes:e.target.value}))} placeholder="Anything else..." style={{...iS,minHeight:50,resize:"vertical",marginBottom:8}} />
                <div style={{display:"flex",gap:6}}>
                  <button onClick={saveFeel} style={btn(cpColor)}>Save</button>
                  <button onClick={()=>setShowFeel(false)} style={{padding:"7px 12px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:5,color:T.textMid,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
                </div>
              </div>
            )}
          </div>

          {/* Recent feelings */}
          {recentFeelings.length>0&&(
            <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14}}>
              <div style={{fontSize:10,color:T.textFaint,marginBottom:10}}>Recent entries</div>
              {recentFeelings.map(([date,entry])=>{
                const ph=CYCLE_INFO[entry.phase]||CYCLE_INFO.follicular;
                const flow=bleedDays[date];
                const fl=flow?FLOW_LEVELS.find(f=>f.key===flow):null;
                return(
                  <div key={date} onClick={()=>{setSelDate(date);setCalMonth({y:parseInt(date.slice(0,4)),m:parseInt(date.slice(5,7))-1});}} style={{background:phaseBg(entry.phase||"follicular",dark),border:`1px solid ${T.border}`,borderRadius:7,padding:"9px 12px",cursor:"pointer",marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:11,color:T.textSub}}>{new Date(date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
                      <div style={{display:"flex",gap:6}}>
                        {fl&&<span style={{fontSize:12,color:fl.color}}>{fl.dot}</span>}
                        {ph&&<span style={{fontSize:10,color:ph.color}}>{ph.label}</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {entry.energy&&<span style={{fontSize:11,color:T.textDim}}>{entry.energy}</span>}
                      {entry.mood?.map(m=><span key={m} style={{fontSize:11,color:T.textDim}}>{m}</span>)}
                    </div>
                    {entry.notes&&<div style={{fontSize:11,color:T.textFaint,fontStyle:"italic",marginTop:3}}>{entry.notes}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {tab==="guide"&&(
        <div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {Object.entries(CYCLE_INFO).map(([k,v])=><button key={k} onClick={()=>{setCyclePhase(k);save({cyclePhase:k});}} style={{padding:"5px 12px",borderRadius:14,border:`1px solid ${cyclePhase===k?v.color:T.border}`,background:cyclePhase===k?v.color+"22":"transparent",color:cyclePhase===k?v.color:T.textFaint,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{v.label}</button>)}
          </div>
          <div style={{background:phaseBg(cyclePhase,dark),border:`1px solid ${cpColor}33`,borderRadius:10,padding:16}}>
            <div style={{fontSize:18,color:cpColor,marginBottom:3}}>{ci.label} · {ci.days}</div>
            <div style={{fontSize:12,color:cpColor+"bb",fontStyle:"italic",marginBottom:12}}>{ci.theme}</div>
            {[["Movement",ci.movement],["Training",ci.training],["Foods",ci.foods]].map(([l,v])=>(
              <div key={l} style={{background:T.surface+"88",borderRadius:7,padding:"10px 12px",marginBottom:8}}>
                <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",color:cpColor,marginBottom:4}}>{l}</div>
                <div style={{fontSize:12,color:T.textSub}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="moon"&&(
        <div>
          {moons.map(m=>{
            const isFull=m.type==="full";
            const mc=isFull?"#f5d070":"#a0b8e8";
            return(
              <div key={m.date} style={{background:T.surface,border:`1px solid ${mc}33`,borderRadius:9,padding:14,marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <span style={{fontSize:22}}>{isFull?"🌕":"🌑"}</span>
                  <div>
                    <div style={{fontSize:14,color:mc}}>{m.name}</div>
                    <div style={{fontSize:11,color:T.textFaint}}>{moonDate(m.date)} · {isFull?"Full Moon":"New Moon"}</div>
                    <div style={{fontSize:12,color:T.textDim,fontStyle:"italic",marginTop:2}}>{m.theme}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{background:T.card,borderRadius:7,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:mc+"88",marginBottom:6}}>Ritual</div>
                    {(isFull?["Review metrics + outcomes","List what worked/drained","Write what you're stopping","Name 3 real wins"]:["Sit with notebook + candle","Choose 1-3 priorities only","Write commitments as actions","Schedule first step now"]).map((r,i)=><div key={i} style={{fontSize:11,color:T.textDim,marginBottom:3}}>· {r}</div>)}
                  </div>
                  <div style={{background:T.card,borderRadius:7,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:mc+"88",marginBottom:6}}>Use for</div>
                    {(isFull?["Evaluation + truth","Pattern recognition","Emotional clearing","Measure → extract → refine"]:["Intention setting","Offer clarity","Decide → define → commit","Schedule first step"]).map((r,i)=><div key={i} style={{fontSize:11,color:T.textDim,marginBottom:3}}>· {r}</div>)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── LIFE VIEW ────────────────────────────────────────────────────────────────
function LifeView({ T, mealPlan, setMealPlan, bills, setBills, reflection, setReflection, hsLog, saveHs, newBill, setNewBill, save, iS, btn }) {
  const [editRef, setEditRef] = useState(false);
  const [refText, setRefText] = useState("");
  const [editMeal, setEditMeal] = useState(null);
  const [mealText, setMealText] = useState("");

  return (
    <div>
      <h2 style={{fontSize:16,fontWeight:400,margin:"0 0 16px",color:TEAL}}>Life Admin</h2>

      {/* Homeschool today */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14,marginBottom:12}}>
        <div style={{fontSize:11,color:T.textFaint,marginBottom:10}}>HOMESCHOOL · TODAY</div>
        <div onClick={()=>saveHs({handwriting:!hsLog.handwriting})} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"5px 6px",borderRadius:6,background:hsLog.handwriting?TEAL+"12":"transparent",marginBottom:8}}>
          <Check done={!!hsLog.handwriting} color={TEAL} onToggle={()=>saveHs({handwriting:!hsLog.handwriting})} />
          <span style={{fontSize:12,color:hsLog.handwriting?T.textFaint:T.textSub,textDecoration:hsLog.handwriting?"line-through":"none"}}>Handwriting practice</span>
        </div>
        <div style={{fontSize:10,color:T.textFaint,marginBottom:6}}>Today's skill (float by energy)</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:hsLog.skill?8:0}}>
          {HS_SKILLS.map(s=><button key={s} onClick={()=>saveHs({skill:hsLog.skill===s?"":s})} style={{padding:"4px 10px",borderRadius:12,fontSize:11,cursor:"pointer",border:`1px solid ${hsLog.skill===s?BLUE:T.border}`,background:hsLog.skill===s?BLUE+"22":"transparent",color:hsLog.skill===s?BLUE:T.textFaint,fontFamily:"inherit"}}>{s}</button>)}
        </div>
        {hsLog.skill&&<input value={hsLog.skillNotes||""} onChange={e=>saveHs({skillNotes:e.target.value})} placeholder={`Notes on ${hsLog.skill}...`} style={iS} />}
      </div>

      {/* Meal plan */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14,marginBottom:12}}>
        <div style={{fontSize:11,color:T.textFaint,marginBottom:12}}>MEAL PLAN · PREP SUNDAY 🍲</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {DAYS.map(d=>(
            <div key={d} style={{background:T.card,borderRadius:6,padding:"8px 10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:T.textFaint}}>{d}</span>
                <button onClick={()=>{setEditMeal(d);setMealText(mealPlan[d]||"");}} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>edit</button>
              </div>
              {editMeal===d
                ?<div><input value={mealText} onChange={e=>setMealText(e.target.value)} style={iS} placeholder="Dinner..." /><div style={{display:"flex",gap:5,marginTop:4}}><button onClick={()=>{const n={...mealPlan,[d]:mealText};setMealPlan(n);save({mealPlan:n});setEditMeal(null);}} style={{...btn(GREEN,true),padding:"3px 9px"}}>Save</button><button onClick={()=>setEditMeal(null)} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕</button></div></div>
                :<div style={{fontSize:12,color:mealPlan[d]?T.textSub:T.textVeryDim,fontStyle:mealPlan[d]?"normal":"italic"}}>{mealPlan[d]||"—"}</div>
              }
            </div>
          ))}
        </div>
      </div>

      {/* Bills */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14,marginBottom:12}}>
        <div style={{fontSize:11,color:T.textFaint,marginBottom:10}}>BILLS & DUE DATES</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 70px 36px",gap:6,marginBottom:10}}>
          <input value={newBill.name} onChange={e=>setNewBill(p=>({...p,name:e.target.value}))} placeholder="Bill" style={iS} />
          <input value={newBill.amount} onChange={e=>setNewBill(p=>({...p,amount:e.target.value}))} placeholder="Amount" style={iS} />
          <input value={newBill.due} onChange={e=>setNewBill(p=>({...p,due:e.target.value}))} placeholder="Due" style={iS} />
          <button onClick={()=>{if(newBill.name){const n=[...bills,{...newBill,id:Date.now()}];setBills(n);save({bills:n});setNewBill({name:"",amount:"",due:""});}}} style={{...btn(TEAL),padding:"7px 10px"}}>+</button>
        </div>
        {bills.length===0?<div style={{fontSize:12,color:T.textVeryDim,fontStyle:"italic"}}>No bills added yet.</div>:bills.map(b=>(
          <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
            <div><span style={{fontSize:13,color:T.textSub}}>{b.name}</span>{b.amount&&<span style={{fontSize:11,color:T.textFaint,marginLeft:8}}>{b.amount}</span>}</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {b.due&&<span style={{fontSize:11,color:AMBER}}>Due: {b.due}</span>}
              <button onClick={()=>{const n=bills.filter(x=>x.id!==b.id);setBills(n);save({bills:n});}} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer"}}>✕</button>
            </div>
          </div>
        ))}
      </div>

      {/* Weekly reflection */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:11,color:T.textFaint}}>WEEKLY REFLECTION · SUNDAY</div>
          <button onClick={()=>{setEditRef(true);setRefText(reflection);}} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Edit</button>
        </div>
        {editRef?(
          <div>
            <textarea value={refText} onChange={e=>setRefText(e.target.value)} placeholder={"What went well?\nWhat was hard?\nWhat needs to change?\nTop 3 priorities next week"} style={{...iS,minHeight:100,resize:"vertical",marginBottom:8}} />
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setReflection(refText);save({reflection:refText});setEditRef(false);}} style={btn(TEAL)}>Save</button>
              <button onClick={()=>setEditRef(false)} style={{padding:"7px 12px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:5,color:T.textMid,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
            </div>
          </div>
        ):(
          <div style={{fontSize:12,color:reflection?T.textSub:T.textVeryDim,fontStyle:reflection?"normal":"italic",whiteSpace:"pre-wrap",lineHeight:1.6}}>{reflection||"No reflection yet."}</div>
        )}
      </div>

      {/* Sunday anchor */}
      <div style={{background:T.surface,border:`1px solid ${GREEN}44`,borderRadius:9,padding:14}}>
        <div style={{fontSize:11,color:GREEN,marginBottom:8}}>SUNDAY ANCHOR 🌿</div>
        {["Grocery shop","Batch meal prep","Intense pool session","Weekly reflection","Schedule next week","Bill check"].map((t,i)=><div key={i} style={{fontSize:12,color:T.textSub,marginBottom:4,paddingLeft:10,borderLeft:`2px solid ${GREEN}44`}}>{t}</div>)}
      </div>
    </div>
  );
}

// ─── MANUAL VIEW ──────────────────────────────────────────────────────────────
function ManualView({ T, manualEntries, setManualEntries, exportManual, save, iS, btn }) {
  const grouped = {};
  manualEntries.forEach(e=>{(grouped[e.checklistText||"General"]=grouped[e.checklistText||"General"]||[]).push(e);});
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <h2 style={{fontSize:16,fontWeight:400,margin:"0 0 4px",color:AMBER}}>SOP Manual</h2>
          <p style={{margin:0,fontSize:12,color:T.textMid,fontStyle:"italic"}}>Building as you go · {manualEntries.length} entries logged</p>
        </div>
        {manualEntries.length>0&&<button onClick={exportManual} style={btn(AMBER)}>Export ↓</button>}
      </div>
      {Object.keys(grouped).length===0?(
        <div style={{textAlign:"center",padding:"40px 20px",color:T.textFaint,fontStyle:"italic"}}>No entries yet. Go to Camp tab and tap "+ log for manual" on any checklist item.</div>
      ):(
        Object.entries(grouped).map(([item,entries])=>(
          <div key={item} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:14,marginBottom:14}}>
            <div style={{fontSize:13,color:AMBER,marginBottom:10}}>{item}</div>
            {entries.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(
              <div key={e.id} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${T.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:T.textFaint}}>{e.date}</span>
                  <button onClick={()=>{const n=manualEntries.filter(x=>x.id!==e.id);setManualEntries(n);save({manualEntries:n});}} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer"}}>✕</button>
                </div>
                {e.what&&<div style={{fontSize:12,color:T.textSub,marginTop:3}}><span style={{color:T.textFaint}}>What:</span> {e.what}</div>}
                {e.why&&<div style={{fontSize:12,color:T.textSub,marginTop:2}}><span style={{color:T.textFaint}}>Why:</span> {e.why}</div>}
                {e.lessons&&<div style={{fontSize:12,color:T.textSub,marginTop:2,fontStyle:"italic"}}><span style={{color:T.textFaint}}>Lessons:</span> {e.lessons}</div>}
              </div>
            ))}
          </div>
        ))
      )}
    </div>
  );
}

// ─── LOG VIEW ─────────────────────────────────────────────────────────────────
function LogView({ T, staticLog, setStaticLog, save, iS, btn }) {
  const [draft, setDraft] = useState({date:"",rhr:"",h1:"",h2:"",h3:"",notes:""});
  return (
    <div>
      <h2 style={{fontSize:16,fontWeight:400,margin:"0 0 4px",color:BLUE}}>Training Log</h2>
      <p style={{margin:"0 0 16px",fontSize:12,color:T.textMid,fontStyle:"italic"}}>David Lee core data: Dry Static times + resting heart rate</p>
      <div style={{background:T.surface,border:`1px solid ${BLUE}33`,borderRadius:9,padding:14,marginBottom:16}}>
        <div style={{fontSize:11,color:T.textFaint,marginBottom:10}}>LOG A SESSION</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><label style={{fontSize:10,color:T.textMid,display:"block",marginBottom:3}}>Date</label><input type="date" value={draft.date} onChange={e=>setDraft(p=>({...p,date:e.target.value}))} style={iS} /></div>
          <div><label style={{fontSize:10,color:T.textMid,display:"block",marginBottom:3}}>Morning RHR (bpm)</label><input value={draft.rhr} onChange={e=>setDraft(p=>({...p,rhr:e.target.value}))} placeholder="58" style={iS} /></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
          {["h1","h2","h3"].map((k,i)=>(
            <div key={k}><label style={{fontSize:10,color:T.textMid,display:"block",marginBottom:3}}>Hold #{i+1} (m:ss)</label><input value={draft[k]} onChange={e=>setDraft(p=>({...p,[k]:e.target.value}))} placeholder="1:45" style={iS} /></div>
          ))}
        </div>
        <div style={{marginBottom:10}}><label style={{fontSize:10,color:T.textMid,display:"block",marginBottom:3}}>Notes (cycle phase, contractions, how it felt)</label><input value={draft.notes} onChange={e=>setDraft(p=>({...p,notes:e.target.value}))} placeholder="Follicular, felt strong, 8 contractions" style={iS} /></div>
        <button onClick={()=>{if(!draft.date)return;const n=[{...draft,id:Date.now()},...staticLog].slice(0,60);setStaticLog(n);save({staticLog:n});setDraft({date:"",rhr:"",h1:"",h2:"",h3:"",notes:""}); }} style={btn(BLUE)}>Save Entry</button>
      </div>
      {staticLog.length===0?(
        <div style={{textAlign:"center",padding:"30px 0",color:T.textFaint,fontStyle:"italic"}}>No entries yet. First Pre Phase session: log your baseline Dry Static times.</div>
      ):(
        staticLog.map(e=>(
          <div key={e.id} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:13,color:T.text}}>{e.date}</span>
              {e.rhr&&<span style={{fontSize:11,color:BLUE}}>RHR: {e.rhr} bpm</span>}
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:e.notes?6:0}}>
              {[e.h1,e.h2,e.h3].filter(Boolean).map((t,i)=>(
                <div key={i} style={{background:T.card,borderRadius:5,padding:"5px 12px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:T.textFaint,marginBottom:2}}>Hold #{i+1}</div>
                  <div style={{fontSize:16,color:BLUE}}>{t}</div>
                </div>
              ))}
            </div>
            {e.notes&&<div style={{fontSize:11,color:T.textFaint,fontStyle:"italic"}}>{e.notes}</div>}
          </div>
        ))
      )}
    </div>
  );
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function makeTheme(dark) {
  return {
    dark,
    bg:          dark ? "#0b0d10" : "#f5f4f0",
    surface:     dark ? "#111318" : "#ffffff",
    border:      dark ? "#1e2128" : "#e0ddd8",
    card:        dark ? "#0f1115" : "#f9f8f6",
    cardAlt:     dark ? "#151820" : "#f2f0ec",
    input:       dark ? "#1a1d24" : "#f0ede8",
    inputBorder: dark ? "#2a2d34" : "#d0cdc8",
    muted:       dark ? "#252830" : "#e8e5df",
    text:        dark ? "#dde4ee" : "#1a1c20",
    textSub:     dark ? "#a0aabb" : "#555e6e",
    textMid:     dark ? "#778"    : "#7a8090",
    textDim:     dark ? "#667"    : "#9aa0aa",
    textFaint:   dark ? "#556"    : "#b0b8c4",
    textVeryDim: dark ? "#334"    : "#c8cdd4",
  };
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
const PHASE_STARTS = {
  pre:    new Date("2026-05-18"),
  phase1: new Date("2026-06-01"),
  phase2: new Date("2026-07-01"),
  phase3: new Date("2026-08-01"),
};
const DOW_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function todayPhase() {
  const d = new Date();
  if (d < new Date("2026-06-01")) return "pre";
  if (d < new Date("2026-07-01")) return "phase1";
  if (d < new Date("2026-08-01")) return "phase2";
  return "phase3";
}
function todayWeekIdx() {
  const ph = todayPhase();
  const ms = 7*24*60*60*1000;
  const max = {pre:2,phase1:4,phase2:4,phase3:4};
  return Math.max(0, Math.min(Math.floor((new Date()-PHASE_STARTS[ph])/ms), max[ph]-1));
}
function todayDow()    { return DOW_NAMES[new Date().getDay()]; }
function isPoolDay()   { return [2,4,6].includes(new Date().getDay()); }
function isCampSeason(){ return new Date() >= new Date("2026-07-04"); }

function upcomingMoons(n=3) {
  const today = new Date();
  return MOONS.filter(m => new Date(m.date) >= today).slice(0,n);
}

  const [dark,   setDark]   = useState(true);

  const [hsLog,         setHsLog]         = useState({});
  const [newTodo,       setNewTodo]       = useState("");
  const [newTodoCat,    setNewTodoCat]    = useState("Dive Training");
  const [newBill,       setNewBill]       = useState({name:"",amount:"",due:""});

  // Storage
  useEffect(() => {
    try {
      const d = JSON.parse(localStorage.getItem("sr_v4") || "{}");
      if (d.checked)       setChecked(d.checked);

      if (d.staticLog)     setStaticLog(d.staticLog);
      if (d.mochaLog)      setMochaLog(d.mochaLog);

      if (d.bleedDays)     setBleedDays(d.bleedDays);

      if (d.todoLog)       setTodoLog(d.todoLog);
      if (d.mealPlan)      setMealPlan(d.mealPlan);
      if (d.bills)         setBills(d.bills);
      if (d.reflection)    setReflection(d.reflection);
      if (d.hsLog)         setHsLog(d.hsLog);
      if (d.dark !== undefined)   setDark(d.dark);
      if (d.injury !== undefined) setInjury(d.injury);
    } catch {}
  }, []);

  function save(updates) {
    try {
      const data = {
        checked, campChecks, campNotes, workoutLog, staticLog,
        mochaLog, mochaScores, mochaBiting, mochaPotty, mochaWeekly,
        manualEntries, cyclePhase, cycleDay, cycleStart, bleedDays,
        feelingsLog, mustsDone, todoLog, mealPlan, bills, reflection,
        hsLog, dark, injury, ...updates,
      };
      localStorage.setItem("sr_v4", JSON.stringify(data));
    } catch {}
  }

  // Computed from date — never stored
  const phase   = todayPhase();
  const weekIdx = todayWeekIdx();
  const dow     = todayDow();
  const camp    = isCampSeason();
  const weeks   = WEEKS[phase];
  const curWeek = weeks[weekIdx];
  const session = injury ? INJURY_WEEK[dow] : curWeek.sessions[dow];
  const dk      = `${phase}_w${weekIdx}_${dow}`;
  const tc      = session ? getTc(session.type) : TEAL;
  const isShab  = session?.type === "shabbat";
  const track   = isPoolDay() ? TRACK_B : TRACK_A;

  // Action helpers
  function toggle(key) {
    const n = {...checked,[key]:!checked[key]};
    setChecked(n); save({checked:n});
  }
  function toggleCamp(key) {
    const n = {...campChecks,[key]:!campChecks[key]};
    setCampChecks(n); save({campChecks:n});
  }
  function toggleMust(id) {
    const day = mustsDone[TODAY_STR]||{};
    const n = {...mustsDone,[TODAY_STR]:{...day,[id]:!day[id]}};
    setMustsDone(n); save({mustsDone:n});
  }
  function toggleMocha(id) {
    const day = mochaLog[TODAY_STR]||{};
    const n = {...mochaLog,[TODAY_STR]:{...day,[id]:!day[id]}};
    setMochaLog(n); save({mochaLog:n});
  }
  function addTodo(text, cat) {
    if (!text.trim()) return;
    const day = todoLog[TODAY_STR]||[];
    const n = {...todoLog,[TODAY_STR]:[...day,{id:Date.now(),cat,text:text.trim(),done:false}]};
    setTodoLog(n); save({todoLog:n});
  }
  function toggleTodo(id) {
    const day = todoLog[TODAY_STR]||[];
    const n = {...todoLog,[TODAY_STR]:day.map(t=>t.id===id?{...t,done:!t.done}:t)};
    setTodoLog(n); save({todoLog:n});
  }
  function removeTodo(id) {
    const day = todoLog[TODAY_STR]||[];
    const n = {...todoLog,[TODAY_STR]:day.filter(t=>t.id!==id)};
    setTodoLog(n); save({todoLog:n});
  }
  function saveHs(data) {
    const n = {...hsLog,[TODAY_STR]:{...(hsLog[TODAY_STR]||{}),...data}};
    setHsLog(n); save({hsLog:n});
  }
  function addManual(entry) {
    const n = [{...entry,id:Date.now(),date:TODAY_STR},...manualEntries];
    setManualEntries(n); save({manualEntries:n});
  }
  function exportManual() {
    const grouped = {};
    manualEntries.forEach(e=>{(grouped[e.checklistText||"General"]=grouped[e.checklistText||"General"]||[]).push(e);});
    let md = "# Moorlands Camps — Acting Manager SOP Manual\n\n*Built Summer 2026*\n\n";
    Object.entries(grouped).forEach(([item,entries])=>{
      md += `## ${item}\n\n`;
      entries.sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
        md += `**${e.date}**\n\n`;
        if (e.what) md += `*What:* ${e.what}\n\n`;
        if (e.why)  md += `*Why:* ${e.why}\n\n`;
        if (e.lessons) md += `*Lessons:* ${e.lessons}\n\n---\n\n`;
      });
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([md],{type:"text/markdown"}));
    a.download = `Moorlands_SOP_${TODAY_STR}.md`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  // Shared style helpers
  const iS = {
    background:T.input, border:`1px solid ${T.inputBorder}`,
    borderRadius:5, padding:"7px 10px", color:T.text,
    fontSize:12, fontFamily:"inherit", width:"100%", boxSizing:"border-box",
  };
  const btn = (color, sm) => ({
    padding: sm?"5px 12px":"7px 16px",
    background:color, border:"none", borderRadius:5,
    color:"#fff", cursor:"pointer", fontSize:12,
    fontFamily:"inherit", fontWeight:600,
  });

  const NAV = [
    ["home","Home"],["week","Week"],["camp","Camp"],
    ["mocha","Mocha"],["cycle","Cycle"],["life","Life"],
    ["manual","Manual"],["log","Log"],
  ];

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"Georgia,serif",fontSize:14}}>

      {/* HEADER */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"14px 16px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:10,letterSpacing:"0.18em",color:TEAL,textTransform:"uppercase",marginBottom:2}}>Honeysuckle Motherhood</div>
            <h1 style={{margin:0,fontSize:20,fontWeight:400,color:T.text}}>Summer Rhythm</h1>
            <div style={{fontSize:11,color:T.textMid,marginTop:2}}>
              {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>{const n=!dark;setDark(n);save({dark:n});}} style={{background:T.muted,border:`1px solid ${T.border}`,borderRadius:16,padding:"5px 10px",cursor:"pointer",fontSize:13}}>{dark?"☀️":"🌙"}</button>
            <button onClick={()=>{const n=!injury;setInjury(n);save({injury:n});}} style={{
              background:injury?"#c4503018":T.muted,
              border:`1px solid ${injury?"#c45030":T.border}`,
              borderRadius:16,padding:"5px 10px",cursor:"pointer",fontSize:12,
              color:injury?"#c45030":T.textFaint,fontFamily:"inherit",
            }}>🦶{injury?" Injury ON":""}</button>
            <div style={{fontSize:11,color:PHASE_META[phase].color,padding:"4px 10px",borderRadius:14,background:PHASE_META[phase].color+"22",border:`1px solid ${PHASE_META[phase].color}44`}}>
              {PHASE_META[phase].label}
            </div>
          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto",borderBottom:`1px solid ${T.border}`}}>
          {NAV.map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{
              padding:"8px 14px",background:"none",border:"none",whiteSpace:"nowrap",
              borderBottom:view===v?`2px solid ${TEAL}`:"2px solid transparent",
              color:view===v?TEAL:T.textFaint,cursor:"pointer",
              fontSize:12,fontFamily:"inherit",marginBottom:-1,
            }}>{l}</button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"16px",maxWidth:800,margin:"0 auto"}}>

        {view==="home" && <HomeView
          T={T} tc={tc} dark={dark}
          session={session} dk={dk} isShab={isShab} injury={injury}
          phase={phase} weekIdx={weekIdx} curWeek={curWeek}
          checked={checked} toggle={toggle}
          mustsDone={mustsDone[TODAY_STR]||{}} toggleMust={toggleMust}
          campChecks={campChecks} toggleCamp={toggleCamp}
          mochaLog={mochaLog[TODAY_STR]||{}} toggleMocha={toggleMocha}
          hsLog={hsLog[TODAY_STR]||{}} saveHs={saveHs}
          todoLog={todoLog[TODAY_STR]||[]} toggleTodo={toggleTodo} removeTodo={removeTodo}
          newTodo={newTodo} setNewTodo={setNewTodo}
          newTodoCat={newTodoCat} setNewTodoCat={setNewTodoCat}
          addTodo={addTodo}
          workoutLog={workoutLog[dk]}
          track={track} dow={dow} camp={camp}
          cyclePhase={cyclePhase} cycleDay={cycleDay}
          staticLog={staticLog}
          moons={upcomingMoons(1)}
          mealPlan={mealPlan}
          setView={setView} iS={iS} btn={btn}
        />}

        {view==="week" && <WeekView
          T={T} phase={phase} weekIdx={weekIdx} curWeek={curWeek}
          dow={dow} checked={checked} toggle={toggle}
          workoutLog={workoutLog} setWorkoutLog={setWorkoutLog}
          injury={injury} save={save} iS={iS} btn={btn}
        />}

        {view==="camp" && <CampView
          T={T} dow={dow}
          campChecks={campChecks} toggleCamp={toggleCamp}
          campNotes={campNotes} setCampNotes={setCampNotes} save={save}
          addManual={addManual} iS={iS} btn={btn}
        />}

        {view==="mocha" && <MochaView
          T={T} mochaLog={mochaLog[TODAY_STR]||{}} toggleMocha={toggleMocha}
          mochaScores={mochaScores} setMochaScores={setMochaScores} save={save}
          mochaBiting={mochaBiting} setMochaBiting={setMochaBiting}
          mochaPotty={mochaPotty} setMochaPotty={setMochaPotty}
          mochaWeekly={mochaWeekly} setMochaWeekly={setMochaWeekly}
          iS={iS} btn={btn}
        />}

        {view==="cycle" && <CycleView
          T={T} dark={dark}
          cyclePhase={cyclePhase} setCyclePhase={setCyclePhase}
          cycleDay={cycleDay} setCycleDay={setCycleDay}
          cycleStart={cycleStart} setCycleStart={setCycleStart}
          bleedDays={bleedDays} setBleedDays={setBleedDays}
          feelingsLog={feelingsLog} setFeelingsLog={setFeelingsLog}
          save={save} moons={upcomingMoons(3)} iS={iS} btn={btn}
        />}

        {view==="life" && <LifeView
          T={T} mealPlan={mealPlan} setMealPlan={setMealPlan}
          bills={bills} setBills={setBills}
          reflection={reflection} setReflection={setReflection}
          hsLog={hsLog[TODAY_STR]||{}} saveHs={saveHs}
          newBill={newBill} setNewBill={setNewBill}
          save={save} iS={iS} btn={btn}
        />}

        {view==="manual" && <ManualView
          T={T} manualEntries={manualEntries} setManualEntries={setManualEntries}
          exportManual={exportManual} save={save} iS={iS} btn={btn}
        />}

        {view==="log" && <LogView
          T={T} staticLog={staticLog} setStaticLog={setStaticLog}
          save={save} iS={iS} btn={btn}
        />}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
